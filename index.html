<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/style.css">
    <script src="../static/script.js" defer></script>
    <title>Accueil</title>
</head>
<body>
    <div class="header">
        [nom_site]
    </div>
    <div class="container">
        <div class="intro">
            Bienvenue sur [nom_site] [description]
        </div>
        <div class="search-bar">
            <input type="text" id="city-input" placeholder="Ajouter une ville">
            <button onclick="addCity()">Ajouter</button>
        </div>
    </div>
    <div class="container">
        <ul id="city-list">

        </ul>
    </div>
</body>
</html>
